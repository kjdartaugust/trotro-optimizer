services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trotro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trotro}
      POSTGRES_DB: ${POSTGRES_DB:-trotro}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Auto-run the schema migration on first boot.
      - ./backend/migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trotro}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trotro}:${POSTGRES_PASSWORD:-trotro}@db:5432/${POSTGRES_DB:-trotro}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-trotro}:${POSTGRES_PASSWORD:-trotro}@db:5432/${POSTGRES_DB:-trotro}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
