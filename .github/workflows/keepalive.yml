name: keep-alive

# Pings the backend so the Render free-tier web service doesn't cold-start (a cold start adds
# ~30-50s to the first request). The /health endpoint also runs `SELECT 1`, which wakes the Neon
# database. Render free spins down after ~15 min idle, so a ping every ~10 min keeps it warm.
#
# Reproducible: set a repo Variable BACKEND_URL (Settings -> Secrets and variables -> Actions ->
# Variables) to your own backend URL when you fork; it falls back to the reference deployment.
# Note: GitHub disables scheduled workflows after 60 days with no repo activity — a manual run
# (or any push) re-enables it. Use "Run workflow" (workflow_dispatch) to trigger it by hand.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend /health
        env:
          BASE: ${{ vars.BACKEND_URL || 'https://trotro-api-gblb.onrender.com' }}
        run: |
          echo "Pinging $BASE/health"
          for i in 1 2 3 4 5; do
            if code=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 90 "$BASE/health"); then
              echo "OK (HTTP $code)"
              exit 0
            fi
            echo "attempt $i failed (service may be waking up), retrying in 30s..."
            sleep 30
          done
          echo "backend did not respond after retries"
          exit 1
