name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: trotro
          POSTGRES_PASSWORD: trotro
          POSTGRES_DB: trotro
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U trotro"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://trotro:trotro@localhost:5432/trotro
      DATABASE_URL_SYNC: postgresql+psycopg://trotro:trotro@localhost:5432/trotro
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt ruff
      - name: Apply schema
        # psql/libpq doesn't understand SQLAlchemy's "+psycopg" driver suffix — strip it.
        run: psql "${DATABASE_URL_SYNC/+psycopg/}" -f backend/migrations/0001_init.sql
      - name: Lint
        working-directory: backend
        run: ruff check .
      - name: Seed + test
        working-directory: backend
        run: |
          python -m app.seed
          pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci || npm install
      - name: Test
        working-directory: frontend
        run: npm test --silent
      - name: Build
        working-directory: frontend
        run: npm run build
